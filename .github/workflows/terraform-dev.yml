name: Terraform — Dev Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: infrastructure/terraform/environments/dev

permissions:
  id-token: write        # OIDC auth to Azure — no stored client secrets
  contents: read
  pull-requests: write   # Post plan output as a PR comment
  security-events: write # Upload SARIF findings to GitHub Security tab

jobs:

  # ── 1. SECURITY SCAN ─────────────────────────────────────────────────────────
  # Runs in parallel with validate. Both must pass before plan/destroy is allowed.
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — IaC security scan
        # Checkov checks for security misconfigurations (open ports, missing encryption,
        # overly permissive IAM, etc.) and fails the pipeline on any HIGH finding.
        #
        # Skipped checks — all require Premium SKU, paid add-ons, or subscription-level
        # feature flags that are out of scope for this playbook:
        #   CKV_AZURE_139 / CKV_AZURE_166 — ACR public access: intentionally true in dev
        #     so GitHub-hosted runners can push; prod overrides to false via variable.
        #   CKV_AZURE_233 — ACR zone redundancy: Premium SKU only (~3× cost).
        #   CKV_AZURE_237 — ACR dedicated data endpoints: Premium SKU only.
        #   CKV_AZURE_165 — ACR geo-replication: Premium SKU only.
        #   CKV_AZURE_163 — ACR vulnerability scanning: requires Defender for Containers.
        #   CKV_AZURE_164 — ACR trusted images (DCT): requires separate content-trust setup.
        #   CKV_AZURE_117 — AKS disk encryption set: needs KV key + DES resource, adds cost.
        #   CKV_AZURE_227 — AKS host encryption: requires subscription-level feature flag.
        #   CKV_AZURE_170 — AKS paid SLA tier: adds ~$73/cluster/month.
        #   CKV_AZURE_226 — AKS ephemeral OS disks: VM-size dependent, not universally safe.
        #   CKV_AZURE_167 — ACR untagged manifest retention: dynamic block applies it for
        #     Standard/Premium SKU; Checkov can't evaluate for_each at scan time so it still
        #     flags the resource even though the control is correctly implemented.
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          skip_check: >-
            CKV_AZURE_139,CKV_AZURE_166,
            CKV_AZURE_233,CKV_AZURE_237,CKV_AZURE_165,
            CKV_AZURE_163,CKV_AZURE_164,
            CKV_AZURE_117,CKV_AZURE_227,CKV_AZURE_170,CKV_AZURE_226,
            CKV_AZURE_167
          soft_fail: false

      - name: Upload Checkov results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Install tfsec
        run: >
          curl -sL
          https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      - name: tfsec — Terraform-specific security analysis
        # Informational only — findings go to the Security tab, do not block the pipeline.
        # Running via CLI (not the action) gives us a predictable output path in GITHUB_WORKSPACE.
        # || true ensures a non-zero tfsec exit code never fails the step.
        run: |
          tfsec infrastructure/terraform --format sarif --out tfsec-results.sarif || true

      - name: Upload tfsec results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

  # ── 2. VALIDATE ──────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM credentials for Terraform OIDC
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: terraform fmt check
        # Enforces consistent formatting across all modules, not just the env entry point.
        # Fail fast here so heavier jobs don't run on poorly formatted code.
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint — init plugins
        working-directory: infrastructure/terraform
        run: tflint --init

      - name: TFLint — lint
        working-directory: ${{ env.WORKING_DIR }}
        run: tflint --format compact

  # ── 3. PLAN ──────────────────────────────────────────────────────────────────
  # Only runs when action=apply. Destroy has its own plan preview inside the destroy job.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [security, validate]
    if: inputs.action == 'apply'
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # terraform_wrapper must be false to capture -detailed-exitcode correctly
          terraform_wrapper: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM credentials for Terraform OIDC
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        # -detailed-exitcode: 0=no changes, 1=error, 2=changes detected
        # tee writes to file AND stdout so logs are still visible in Actions UI
        run: |
          set +e
          terraform plan -out=tfplan.dev -detailed-exitcode 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      - name: Upload plan artifact
        # Only upload when there are changes (exitcode=2) — nothing to apply otherwise
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}/tfplan.dev
          retention-days: 1

      - name: Post plan output as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('${{ env.WORKING_DIR }}/plan-output.txt', 'utf8');
            const plan = raw.length > 60000
              ? raw.slice(0, 60000) + '\n\n...[truncated — see full output in Actions logs]'
              : raw;
            const code = '${{ steps.plan.outputs.exitcode }}';
            const badge = code === '0' ? '✅ No changes'
                        : code === '2' ? '⚠️ Changes detected'
                        : '❌ Plan failed';

            const body = [
              `## Terraform Plan — Dev ${badge}`,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} · commit \`${{ github.sha }}\`*`
            ].join('\n');

            // Replace previous bot comment to keep the PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.includes('## Terraform Plan — Dev')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "terraform plan returned an error — review the output above"
          exit 1

  # ── 4. APPLY ─────────────────────────────────────────────────────────────────
  # Runs only when action=apply and plan detected changes.
  # Requires human approval in GitHub → Settings → Environments → dev.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.ref == 'refs/heads/main' &&
      inputs.action == 'apply' &&
      needs.plan.outputs.exitcode == '2'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM credentials for Terraform OIDC
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download approved plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}

      - name: terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan.dev

  # ── 5. DESTROY ───────────────────────────────────────────────────────────────
  # Runs only when action=destroy. Skips the plan job entirely.
  # Shows a destroy preview first, then requires human approval before deleting.
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: [security, validate]
    if: |
      github.ref == 'refs/heads/main' &&
      inputs.action == 'destroy'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set ARM credentials for Terraform OIDC
        run: |
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform plan -destroy (preview)
        # Shows exactly which resources will be deleted before the environment
        # approval gate. Review this output in the Actions log before approving.
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -destroy 2>&1 | tee destroy-plan.txt

      - name: terraform destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform destroy -auto-approve
