name: Build, Scan and Push to ACR

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build — comma-separated names or "all"'
        required: false
        default: 'all'

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

permissions:
  id-token: write        # OIDC auth to Azure
  contents: write        # Commit updated image tags back to repo
  pull-requests: write
  security-events: write # Upload SARIF to GitHub Security tab

jobs:

  # ── 1. DETECT CHANGED SERVICES ───────────────────────────────────────────────
  # On push/PR: compares the commit against its parent (or PR base) and outputs
  # only the service directories that changed.
  # On workflow_dispatch: skips the git-diff step entirely — paths-filter finds
  # no diff on a manual run and would return [] causing all jobs to be skipped.
  # Instead the resolve step converts the "services" input into the same JSON
  # array format that downstream jobs expect.
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.resolve.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            adservice:
              - 'src/adservice/**'
            cartservice:
              - 'src/cartservice/**'
            checkoutservice:
              - 'src/checkoutservice/**'
            currencyservice:
              - 'src/currencyservice/**'
            emailservice:
              - 'src/emailservice/**'
            frontend:
              - 'src/frontend/**'
            loadgenerator:
              - 'src/loadgenerator/**'
            paymentservice:
              - 'src/paymentservice/**'
            productcatalogservice:
              - 'src/productcatalogservice/**'
            recommendationservice:
              - 'src/recommendationservice/**'
            shippingservice:
              - 'src/shippingservice/**'
            shoppingassistantservice:
              - 'src/shoppingassistantservice/**'

      - name: Resolve service list
        id: resolve
        env:
          # Passed via env to prevent shell injection — ${{ github }} context values
          # are user-controlled (branch names, PR titles, input fields) and must never
          # be interpolated directly into a run: block.
          EVENT_NAME: ${{ github.event_name }}
          SERVICES_INPUT: ${{ github.event.inputs.services }}
        run: |
          ALL='["adservice","cartservice","checkoutservice","currencyservice","emailservice","frontend","loadgenerator","paymentservice","productcatalogservice","recommendationservice","shippingservice","shoppingassistantservice"]'
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            INPUT="$SERVICES_INPUT"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              echo "services=${ALL}" >> $GITHUB_OUTPUT
            else
              # Convert "frontend, cartservice" → ["frontend","cartservice"]
              SERVICES=$(echo "$INPUT" | jq -Rc '[split(",")[] | ltrimstr(" ") | rtrimstr(" ")]')
              echo "services=${SERVICES}" >> $GITHUB_OUTPUT
            fi
          else
            echo "services=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          fi

  # ── 2. SECRET LEAK SCAN ──────────────────────────────────────────────────────
  # Scans the full git history for accidentally committed secrets (API keys,
  # passwords, tokens). Runs before any build so secrets are caught immediately.
  secret-scan:
    name: Secret leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required — Gitleaks scans every commit, not just HEAD

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. SAST ──────────────────────────────────────────────────────────────────
  # Static Application Security Testing — analyses source code for security
  # vulnerabilities without running it (SQLi, XSS, hardcoded creds, etc.).
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep — multi-language static analysis
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/golang
            p/python
            p/javascript
            p/java
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── 4. SCA ───────────────────────────────────────────────────────────────────
  # Software Composition Analysis — scans third-party dependencies for known
  # CVEs (go.sum, requirements.txt, package-lock.json, pom.xml, etc.).
  sca:
    name: SCA — dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — SCA findings table (log output)
        # Prints a human-readable table to the job log so you can see package names,
        # CVE IDs, severity, installed version, and fixed version without opening
        # the GitHub Security tab. exit-code 0 means this step never blocks —
        # the SARIF step below is the actual gate.
        # trivyignores must be set explicitly — when scan-ref is src/, Trivy
        # resolves the ignore file relative to that directory, not the workspace root.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: src/
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'
          trivyignores: .trivyignore

      - name: Trivy — scan dependency manifests in src/ (SARIF gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: src/
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-sca.sarif
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Upload SCA results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca

  # ── 5. BUILD AND PUSH ────────────────────────────────────────────────────────
  # One parallel job per changed service — faster than a serial loop when
  # multiple services change at once. Skipped entirely if no services changed
  # (e.g. a workflow-only commit). All four security gates must pass first.
  #
  # Tag format: sha-<7-char-sha> — short enough to read in ACR and kustomize
  # diffs, long enough to be unique. Each service keeps its own tag from the
  # commit that last changed it, so the kustomize overlay is a per-service
  # changelog rather than a snapshot of the latest commit.
  #
  # cartservice is a .NET project whose Dockerfile lives at
  # src/cartservice/src/Dockerfile — the build-paths step handles this.
  build-push:
    name: Build and push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, secret-scan, sast, sca]
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set build paths
        id: paths
        # cartservice nests its source under src/cartservice/src/ — all other
        # services place their Dockerfile directly in src/<service>/
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" = "cartservice" ]; then
            echo "DOCKERFILE=src/cartservice/src/Dockerfile" >> $GITHUB_OUTPUT
            echo "CONTEXT=src/cartservice/src" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE=src/${SERVICE}/Dockerfile" >> $GITHUB_OUTPUT
            echo "CONTEXT=src/${SERVICE}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -f ${{ steps.paths.outputs.DOCKERFILE }} \
            ${{ steps.paths.outputs.CONTEXT }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}

  # ── 6. IMAGE SCAN ────────────────────────────────────────────────────────────
  # Trivy scans each pushed image for OS and package vulnerabilities.
  # Matrix mirrors build-push — only services that were just pushed are scanned.
  # fail-fast: false ensures all services are scanned even if one has CRITICAL
  # findings, giving a full picture before the pipeline fails.
  image-scan:
    name: Image scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Trivy — image findings table (log output)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}
          scanners: vuln
          severity: CRITICAL
          format: table
          exit-code: '0'

      - name: Trivy — scan ${{ matrix.service }} image (SARIF gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ steps.tag.outputs.IMAGE_TAG }}
          scanners: vuln
          severity: CRITICAL
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          exit-code: '1'

      - name: Upload image scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

  # ── 7. UPDATE GITOPS TAGS ────────────────────────────────────────────────────
  # Only runs on main after all changed images pass scanning. Updates only the
  # kustomize entries for services that were rebuilt — other services keep their
  # existing tags. Runs as a single job (not a matrix) to avoid concurrent
  # commits racing on the same kustomization.yaml file.
  update-tags:
    name: Update dev image tags
    runs-on: ubuntu-latest
    needs: [detect-changes, image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.services != '[]'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update dev overlay image tags
        env:
          SERVICES: ${{ needs.detect-changes.outputs.services }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          cd kubernetes/overlays/dev
          echo "$SERVICES" | jq -r '.[]' | while read SERVICE; do
            kustomize edit set image \
              gcr.io/google-samples/microservices-demo/${SERVICE}=${{ env.ACR_LOGIN_SERVER }}/${SERVICE}:${IMAGE_TAG}
          done

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/overlays/dev/kustomization.yaml
          git commit -m "ci: update dev image tags to sha-$(echo '${{ github.sha }}' | cut -c1-7)" || echo "No changes to commit"
          git push
