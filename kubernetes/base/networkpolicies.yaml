# Block all ingress and egress by default — all traffic must be explicitly allowed below
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: boutique
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# DNS egress is required for kube-dns resolution on all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: boutique
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# frontend: receives from the LoadBalancer (any source); calls all seven backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: productcatalogservice
    ports:
    - port: 3550
  - to:
    - podSelector:
        matchLabels:
          app: currencyservice
    ports:
    - port: 7000
  - to:
    - podSelector:
        matchLabels:
          app: cartservice
    ports:
    - port: 7070
  - to:
    - podSelector:
        matchLabels:
          app: recommendationservice
    ports:
    - port: 8080
  - to:
    - podSelector:
        matchLabels:
          app: shippingservice
    ports:
    - port: 50051
  - to:
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 5050
  - to:
    - podSelector:
        matchLabels:
          app: adservice
    ports:
    - port: 9555
---
# productcatalogservice: called by frontend, checkoutservice, and recommendationservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-productcatalogservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: productcatalogservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - podSelector:
        matchLabels:
          app: checkoutservice
    - podSelector:
        matchLabels:
          app: recommendationservice
    ports:
    - port: 3550
---
# currencyservice: called by frontend and checkoutservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-currencyservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: currencyservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 7000
---
# cartservice: called by frontend and checkoutservice; sends to redis-cart
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cartservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 7070
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis-cart
    ports:
    - port: 6379
---
# redis-cart: accepts connections only from cartservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-cart
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: redis-cart
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cartservice
    ports:
    - port: 6379
---
# recommendationservice: called by frontend; sends to productcatalogservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-recommendationservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: recommendationservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: productcatalogservice
    ports:
    - port: 3550
---
# shippingservice: called by frontend and checkoutservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-shippingservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: shippingservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 50051
---
# checkoutservice: called by frontend; calls six downstream services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-checkoutservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - port: 5050
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: productcatalogservice
    ports:
    - port: 3550
  - to:
    - podSelector:
        matchLabels:
          app: shippingservice
    ports:
    - port: 50051
  - to:
    - podSelector:
        matchLabels:
          app: paymentservice
    ports:
    - port: 50051
  - to:
    - podSelector:
        matchLabels:
          app: emailservice
    ports:
    - port: 8080
  - to:
    - podSelector:
        matchLabels:
          app: currencyservice
    ports:
    - port: 7000
  - to:
    - podSelector:
        matchLabels:
          app: cartservice
    ports:
    - port: 7070
---
# paymentservice: accepts connections only from checkoutservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-paymentservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: paymentservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 50051
---
# emailservice: accepts connections only from checkoutservice (container port 8080, Service port 5000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-emailservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: emailservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: checkoutservice
    ports:
    - port: 8080
---
# adservice: accepts connections only from frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-adservice
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: adservice
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - port: 9555
